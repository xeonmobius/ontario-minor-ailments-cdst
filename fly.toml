# Fly.io deployment config for CDST (Clinical Decision Support Tool)
# Canadian region (yyz = Toronto) for PHIPA data residency

app = "cdst-app"
primary_region = "yyz"

[build]

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[vm]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[vm.mounts]]
  source = "cdst_data"
  destination = "/data"
